services:
  postgres:
    image: postgres:16-alpine
    container_name: ritualx-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ritualx}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ritualx_dev}
      POSTGRES_DB: ${DB_NAME:-ritualx}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
